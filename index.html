<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pallet Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Pallet Tracker</h1>
    <div id="metrics">
      <div class="card">Total issued<br><span id="total-issued">0</span></div>
      <div class="card">Total returned<br><span id="total-returned">0</span></div>
      <div class="card">Net outstanding<br><span id="net-outstanding">0</span></div>
      <div class="card">Customer count<br><span id="customer-count">0</span></div>
    </div>
  </header>

  <main>
    <section id="entry">
      <h2>Record Movement</h2>
      <form id="movement-form">
        <label>
          <input type="radio" name="type" value="issue" checked> Issue
        </label>
        <label>
          <input type="radio" name="type" value="return"> Return
        </label>

        <div class="row">
          <label>Customer
            <input list="customers-list" id="customer" name="customer" required>
            <datalist id="customers-list"></datalist>
          </label>
          <button type="button" id="edit-customer">Edit</button>
        </div>

        <label>Quantity
          <input type="number" id="qty" name="qty" value="1" min="1" max="100000" required>
        </label>

        <label>Date
          <input type="date" id="date" name="date">
        </label>

        <label>Note
          <input type="text" id="note" name="note" placeholder="Optional">
        </label>

        <label>Staff
          <select id="staff-select" required></select>
        </label>
        <div class="row">
          <input type="text" id="new-staff-name" placeholder="New staff name">
          <button type="button" id="add-staff">Add staff</button>
        </div>

        <div class="actions">
          <button type="submit" id="submit-btn">Record</button>
          <button type="button" id="export-csv">Export CSV</button>
          <button type="button" id="undo-btn">Undo Last</button>
        </div>
      </form>
    </section>

    <section id="log">
      <h2>Movement Log</h2>
      <div class="filters">
        <select id="filter-customer"><option value="">All customers</option></select>
        <select id="filter-type"><option value="">All types</option><option value="issue">Issue</option><option value="return">Return</option></select>
        <select id="filter-staff"><option value="">All staff</option></select>
      </div>
      <table id="movements-table">
        <thead><tr><th>Date</th><th>Customer</th><th>Type</th><th>Qty</th><th>Staff</th><th>Note</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="balances">
      <h2>Customer Balances</h2>
      <table id="balances-table">
        <thead><tr><th>Customer</th><th>Issued</th><th>Returned</th><th>Balance</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
